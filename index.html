<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Station - Login</title>
    <link rel="icon" type="image/png" href="logo of.png">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="top-bar">
        <div class="logo-container">
            <img src="logo of.png" class="logo" alt="Car Station Logo">
            <span class="logo-text">Car Station</span>
        </div>
    </div>

    <div class="container">

        <div class="login-box">

            <!-- STEP 1: LOGIN -->
            <div id="step-login">
                <h2>Car Station Indicadores</h2>
                <p>Acesse seus dashboards</p>

                <div class="input-group">
                    <input type="email" id="user" placeholder=" " required autocomplete="email">
                    <label for="user">Email</label>
                </div>

                <div class="input-group password-group">
                    <input type="password" id="pass" placeholder=" " required autocomplete="current-password">
                    <label for="pass">Senha</label>
                    <span class="toggle-password" onclick="togglePassword('pass', 'eyeIcon')" title="Mostrar/ocultar senha">
                        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none"
                            stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                    </span>
                </div>

                <div id="error-container"></div>

                <button type="button" id="login-btn" onclick="login()" class="btn-login">
                    <span id="btn-text">Entrar</span>
                    <span id="btn-loader" class="loader" style="display: none;"></span>
                </button>

                <p class="help-text">Use seu email e senha cadastrados</p>
            </div>

            <!-- STEP 2: DEFINIR SENHA -->
            <div id="step-senha" style="display: none;">
                <h2>Bem-vindo!</h2>
                <p>Por segurança, crie uma senha pessoal para continuar.</p>

                <div class="input-group password-group">
                    <input type="password" id="nova-senha" placeholder=" " required autocomplete="new-password">
                    <label for="nova-senha">Nova senha</label>
                    <span class="toggle-password" onclick="togglePassword('nova-senha', 'eyeIcon2')" title="Mostrar/ocultar senha">
                        <svg id="eyeIcon2" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none"
                            stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                    </span>
                </div>

                <div class="input-group password-group">
                    <input type="password" id="confirma-senha" placeholder=" " required autocomplete="new-password">
                    <label for="confirma-senha">Confirmar senha</label>
                    <span class="toggle-password" onclick="togglePassword('confirma-senha', 'eyeIcon3')" title="Mostrar/ocultar senha">
                        <svg id="eyeIcon3" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none"
                            stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                    </span>
                </div>

                <div id="error-container-senha"></div>

                <button type="button" id="senha-btn" onclick="definirSenha()" class="btn-login">
                    <span id="senha-btn-text">Confirmar</span>
                    <span id="senha-btn-loader" class="loader" style="display: none;"></span>
                </button>

                <p class="help-text">Mínimo 6 caracteres</p>
            </div>

        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
